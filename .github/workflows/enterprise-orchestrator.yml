name: Enterprise Self-Healing Orchestrator

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  
jobs:
  sast_scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the results to the GitHub Security tab
      security-events: write 
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Phase 1: Initialize the scanner
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript, python'

      # Phase 2 & 3: Run the analysis and upload the report
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
