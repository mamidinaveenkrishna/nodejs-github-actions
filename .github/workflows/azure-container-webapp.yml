name: Reusable Node.js Build

on:
  workflow_call:
    inputs:
      node_version:
        required: true
        type: string
        description: "The version of Node.js to use"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }} # Uses the dynamic input!
      - run: npm ci
      - run: npm test

name: Microservice A Pipeline

on: [push]

jobs:
  call-master-build:
    # We simply point to the central file and pass the input!
    uses: my-org/central-repo/.github/workflows/reusable-build.yml@main
    with:
      node_version: '20'
